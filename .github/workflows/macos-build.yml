name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name MileageTracker --paths src src/main.py

      - name: Zip macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/MileageTracker.app MileageTracker-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MileageTracker-macOS
          path: MileageTracker-macOS.zip