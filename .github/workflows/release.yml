name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            zip_name: MileageTracker-windows.zip
            package_command: Compress-Archive -Path dist\MileageTracker\* -DestinationPath MileageTracker-windows.zip
          - os: macos-latest
            zip_name: MileageTracker-macOS.zip
            package_command: ditto -c -k --sequesterRsrc --keepParent dist/MileageTracker MileageTracker-macOS.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean --windowed --name MileageTracker --paths src src/main.py

      - name: Package Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\MileageTracker\* -DestinationPath MileageTracker-windows.zip

      - name: Package macOS
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/MileageTracker MileageTracker-macOS.zip

      - name: Upload build zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          pattern: MileageTracker-*.zip
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}